
#
# Production Docker Compose for Superset on Dokploy
# With custom configuration file support
#

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: superset_cache
    restart: unless-stopped
    volumes:
      - redis:/data
    networks:
      - superset-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: superset_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - db_home:/var/lib/postgresql/data
    networks:
      - superset-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset-init:
    image: apache/superset:latest
    container_name: superset_init
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin \
        --username ${ADMIN_USERNAME:-admin} \
        --firstname Superset \
        --lastname Admin \
        --email ${ADMIN_EMAIL:-admin@superset.com} \
        --password ${ADMIN_PASSWORD} || echo 'Admin user already exists' &&
      superset init
      "
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: superset
      DATABASE_USER: superset
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      SUPERSET_LOAD_EXAMPLES: no
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - superset-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    healthcheck:
      disable: true

  superset:
    image: apache/superset:latest
    container_name: superset_app
    restart: unless-stopped
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: superset
      DATABASE_USER: superset
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      SUPERSET_LOAD_EXAMPLES: no
      
      # Email/SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-True}
      SMTP_SSL: ${SMTP_SSL:-False}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_MAIL_FROM: ${SMTP_MAIL_FROM:-superset@yourdomain.com}
    
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    
    networks:
      - superset-net
    
    ports:
      - "8088:8088"
    
    depends_on:
      superset-init:
        condition: service_completed_successfully
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  superset-worker:
    image: apache/superset:latest
    container_name: superset_worker
    command: celery --app=superset.tasks.celery_app:app worker --pool=prefork -O fair -c ${CELERYD_CONCURRENCY:-4}
    restart: unless-stopped
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: superset
      DATABASE_USER: superset
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      CELERYD_CONCURRENCY: ${CELERYD_CONCURRENCY:-4}
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - superset-net
    depends_on:
      superset:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  superset-worker-beat:
    image: apache/superset:latest
    container_name: superset_worker_beat
    command: celery --app=superset.tasks.celery_app:app beat --pidfile /tmp/celerybeat.pid --schedule /tmp/celerybeat-schedule
    restart: unless-stopped
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: superset
      DATABASE_USER: superset
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - superset-net
    depends_on:
      - superset-worker
    healthcheck:
      disable: true

volumes:
  superset_home:
    driver: local
  db_home:
    driver: local
  redis:
    driver: local

networks:
  superset-net:
    driver: bridge
